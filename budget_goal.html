<!DOCTYPE html>
<html>
<head>
    <title>Budget and Goals</title>
    <link rel="stylesheet" href="budgetstyle.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <header>
        <div class="bar">
            <div class="tab">Budget</div>
            <div class="tab">Goals</div>
            <a href="home.html"><button class="home-btn" id="homeBtn">=</button></a>
            <button class="plus-btn" id="plusBtn">+</button>
            <div class="dropdown-menu" id="dropdownMenu">
                <button class="nav-btn" onclick="openDialog('categoryForm')">Insert Category</button>
                <button class="nav-btn" onclick="openDialog('expenseForm')">Insert Expense</button>
                <button class="nav-btn" onclick="openDialog('shortForm')">Insert Short Term</button>
                <button class="nav-btn" onclick="openDialog('longForm')">Insert Long Term</button>
            </div>
        </div>
    </header>

    <div class="main">
        <!-- TABLE -->
        <div class="budget-side">
            <table class="budget-table" id="budgetTable">
                <thead>
                    <tr id="catRow">
                        <th style="background:transparent;border:none;width:20px;"></th>
                    </tr>
                </thead>
                <tbody id="expenseBody"></tbody>
            </table>
        </div>

        <!-- GOALS -->
        <div class="goals-side">
            <div class="priority-box">
                <h3>Priority Goals</h3>
                <div id="priorityList"><p class="no-goals-msg">Priorities</p></div>
            </div>
            <div class="goal-buttons">
                <button class="goal-tab-btn" onclick="openGoalPopup('short')">Short Term</button>
                <button class="goal-tab-btn" onclick="openGoalPopup('long')">Long Term</button>
            </div>
        </div>
    </div>

    <!-- GOAL POPUPS -->
    <div class="goal-popup" id="shortPopup">
        <div class="goal-popup-inner">
            <button class="popup-close" onclick="closeGoalPopup('short')">✕</button>
            <h3>Short Term Goals</h3>
            <div id="shortGoalPopupList"><p class="no-popup-msg">No short-term goals yet.</p></div>
        </div>
    </div>
    <div class="goal-popup" id="longPopup">
        <div class="goal-popup-inner">
            <button class="popup-close" onclick="closeGoalPopup('long')">✕</button>
            <h3>Long Term Goals</h3>
            <div id="longGoalPopupList"><p class="no-popup-msg">No long-term goals yet.</p></div>
        </div>
    </div>

    <!-- DIALOGS -->
    <dialog id="categoryForm">
        <h3>Insert Category</h3>
        <label>Category Name</label>
        <input type="text" id="catInput" placeholder="e.g. Rent, Groceries...">
        <div class="dialog-btns">
            <button class="dbtn-add" id="addCatBtn">Add</button>
            <button class="dbtn-close" onclick="closeDialog('categoryForm')">Cancel</button>
        </div>
    </dialog>

    <dialog id="expenseForm">
        <h3>Insert Expense</h3>
        <label>Expense Name</label>
        <input type="text" id="expInput" placeholder="e.g. Monthly rent">
        <label>Amount ($)</label>
        <input type="number" id="expAmt" placeholder="0.00" min="0" step="0.01">
        <label>Category</label>
        <select id="expCat"><option value="">— select —</option></select>
        <div class="dialog-btns">
            <button class="dbtn-add" id="addExpBtn">Add</button>
            <button class="dbtn-close" onclick="closeDialog('expenseForm')">Cancel</button>
        </div>
    </dialog>

    <dialog id="shortForm">
        <h3>Insert Short Term Goal</h3>
        <label>Goal</label>
        <input type="text" id="shortInput" placeholder="e.g. Emergency fund">
        <label>Target ($, optional)</label>
        <input type="number" id="shortTarget" placeholder="e.g. 1000" min="0" step="0.01">
        <label>Deadline (optional)</label>
        <input type="text" id="shortDeadline" placeholder="e.g. Dec 2025">
        <div class="dialog-btns">
            <button class="dbtn-add" id="addShortBtn">Add</button>
            <button class="dbtn-close" onclick="closeDialog('shortForm')">Cancel</button>
        </div>
    </dialog>

    <dialog id="longForm">
        <h3>Insert Long Term Goal</h3>
        <label>Goal</label>
        <input type="text" id="longInput" placeholder="e.g. Buy a house">
        <label>Target ($, optional)</label>
        <input type="number" id="longTarget" placeholder="e.g. 50000" min="0" step="0.01">
        <label>Deadline (optional)</label>
        <input type="text" id="longDeadline" placeholder="e.g. 2030">
        <div class="dialog-btns">
            <button class="dbtn-add" id="addLongBtn">Add</button>
            <button class="dbtn-close" onclick="closeDialog('longForm')">Cancel</button>
        </div>
    </dialog>

    <script src="budgetscript.js"></script>
</body>
</html>

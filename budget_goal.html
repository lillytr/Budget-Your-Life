<!DOCTYPE html>
<html>
<head>
    <title>Budget and Goals</title>
    <link rel="stylesheet" href="budgetstyle.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <header>
        <div class = "bar">
            <div class = "tab">Budget</div>
            <div class = "tab">Goals</div>
            <a href = "home.html"><button class="home-btn" id="homeBtn"><img href = "https://www.flaticon.com/free-icon/home_2550264?term=home&page=1&position=4&origin=tag&related_id=2550264"></button></a>
            <button class="plus-btn" id="plusBtn">+</button>
                <div class="dropdown-menu" id="dropdownMenu">
                    <button class = "nav-btn" id="openForm">Insert Category</button>
                    <button class = "nav-btn" id="openExpenseForm">Insert Expense</button>
                    <button class = "nav-btn" id="openShortForm">Insert Short Term</button>
                    <button class = "nav-btn" id="openLongForm">Insert Long Term</button>
                </div>
        </div>

        <!-- CATEGORY FORM BUTTON -->
            <dialog id = "categoryForm">
                <h3>Insert Category</h3>
                <form method="dialog">
                    <label for="category">Category Name:</label>
                    <input type="text" id="category" name="category" placeholder="e.g. Rent, Groceries, etc." required>
                    <br>
                    <button type="submit">Submit</button>
                    <button type="button" onclick="this.closest('dialog').close()">Close</button>
                </form>
            </dialog>
        
        <!-- EXPENSE FORM BUTTON -->
            <dialog id="expenseForm">
                <h3>Insert Expense</h3>
                <label>Expense Name:</label>
                <input type="text" id="expInput" placeholder="e.g. Monthly rent" required>
                <label>Amount ($):</label>
                <input type="number" id="expAmt" placeholder="0.00" min="0" step="0.01">
                <label>Category:</label>
                <select id="expCat"><option value="">— select —</option></select>
                <div class="dialog-btns">
                    <button class="dbtn-add" id="addExpBtn">Submit</button>
                    <button class="dbtn-close" onclick="this.closest('dialog').close()">Cancel</button>
                </div>
            </dialog>

        <!-- SHORT TERM FORM BUTTON -->
            <dialog id = "shortForm">
                <h3>Insert Short Term Goal</h3>
                <form method="dialog">
                    <label for="short">Short Term Goal:</label>
                    <input type="text" id="short" name="short" required>
                    <br>
                    <button type="submit">Submit</button>
                    <button type="button" onclick="this.closest('dialog').close()">Close</button>
                </form>
            </dialog>

        <!-- LONG TERM FORM BUTTON -->
            <dialog id = "longForm">
                <h3>Insert Long Term Goal</h3>
                <form method="dialog">
                    <label for="long">Long Term Goal:</label>
                    <input type="text" id="long" name="long" required>
                    <br>
                    <button type="submit">Submit</button>
                    <button type="button" onclick="this.closest('dialog').close()">Close</button>
                </form>
            </dialog>

    </header>

    <table>
        <thead>
            <tr>
                <th>Category</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        const categories = [];
        const shortGoals = [];
        const longGoals  = [];
        const NUM_ROWS   = 8;

        /*FORM BUTTONS*/
            const categoryDialog = document.getElementById('categoryForm');
            const expenseDialog = document.getElementById('expenseForm');
            const shortDialog = document.getElementById('shortForm');
            const longDialog = document.getElementById('longForm');

            document.getElementById('openForm').onclick = () => categoryDialog.showModal();
            document.getElementById('openExpenseForm').onclick = () => expenseDialog.showModal();
            document.getElementById('openShortForm').onclick = () => shortDialog.showModal();
            document.getElementById('openLongForm').onclick = () => longDialog.showModal();

        /*ADD ROW TO TABLE (Category)*/
            const categoryForm = categoryDialog.querySelector('form');
            const tableBody = document.querySelector('table tbody');

            categoryForm.addEventListener('submit', function(e) {
                e.preventDefault(); 

                const categoryInput = document.getElementById('category');
                const categoryValue = categoryInput.value;

                const col = document.createElement('th');

                const cell1 = document.createElement('td');
                cell1.textContent = categoryValue;

                col.appendChild(cell1);
                tableBody.appendChild(col);

                categoryInput.value = "";
                categoryDialog.close();
            });
        
        /*ADD EXPENSE TO CATEGORY*/
            const expenseForm = expenseDialog.querySelector('form');

            expenseForm.addEventListener('submit', function(e) {
                e.preventDefault(); 

                const expenseInput = document.getElementById('expenseForm');
                const expenseValue = expenseInput.value;

                const row = document.createElement('tr');

                const cell1 = document.createElement('td');
                cell1.textContent = expenseValue;

                row.appendChild(cell1);
                tableBody.appendChild(row);

                expenseInput.value = "";
                expenseDialog.close();
            });

        /*ADD SHORT TERM GOAL*/
        document.getElementById('addShortBtn').onclick = () => {
        const text     = document.getElementById('shortInput').value.trim();
        const target   = document.getElementById('shortTarget').value.trim();
        const deadline = document.getElementById('shortDeadline').value.trim();
        if (!text) return;
            shortGoals.push({ text, target: target ? parseFloat(target) : null, deadline });
            renderGoals();
            document.getElementById('shortInput').value    = '';
            document.getElementById('shortTarget').value   = '';
            document.getElementById('shortDeadline').value = '';
            closeDialog('shortForm');
        };
        
        /*ADD LONG TERM GOAL*/
        document.getElementById('addLongBtn').onclick = () => {
        const text     = document.getElementById('longInput').value.trim();
        const target   = document.getElementById('longTarget').value.trim();
        const deadline = document.getElementById('longDeadline').value.trim();
        if (!text) return;
            longGoals.push({ text, target: target ? parseFloat(target) : null, deadline });
            renderGoals();
            document.getElementById('longInput').value    = '';
            document.getElementById('longTarget').value   = '';
            document.getElementById('longDeadline').value = '';
            closeDialog('longForm');
        };

    </script>
</body>


</html>
